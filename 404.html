<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moved! - Camcookie Books</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<center><h1 class="header">404</h1></center>
<div class="content">
Camcookie Books has moved!
<button id="myBtn" onclick="Moved()">Camcookie Books has moved!</button>
</div>
<p>Camcookie Books · © 2026</p>
<script>
function Moved() {
    try {
        const newHome = "https://camcookie876.github.io";
        const currentPath = window.location.pathname + window.location.search + window.location.hash;
        const newUrl = newHome + currentPath;
        window.location.replace(newUrl);
    } catch (error) {
        alert("Redirect Failed Because:", error);
    }
};
</script>
</body>
</html>
